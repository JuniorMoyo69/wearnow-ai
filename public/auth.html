<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WearNowai — Sign In</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>

    <!-- CARD -->
    <div class="auth-card">
      <div class="auth-logo">
        <img src="logo.png" alt="WearNowai" class="logo-img" />
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
            <button type="button" class="toggle-pw" data-target="loginPassword" tabindex="-1">
              <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error hidden" id="loginError"></div>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden">
            <svg viewBox="0 0 24 24" class="spin-icon" fill="none" stroke="currentColor" stroke-width="3">
              <circle cx="12" cy="12" r="10" stroke-dasharray="31.416" stroke-dashoffset="23.562">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.9s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form hidden" id="registerForm" novalidate>
        <div class="form-group">
          <label for="regName">Display Name</label>
          <input type="text" id="regName" placeholder="How you'll appear in the gallery" maxlength="30" autocomplete="nickname" />
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="regPassword" placeholder="At least 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="regPassword" tabindex="-1">
              <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error hidden" id="registerError"></div>
        <button type="submit" class="auth-btn" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden">
            <svg viewBox="0 0 24 24" class="spin-icon" fill="none" stroke="currentColor" stroke-width="3">
              <circle cx="12" cy="12" r="10" stroke-dasharray="31.416" stroke-dashoffset="23.562">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.9s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </span>
        </button>
      </form>

      <p class="auth-legal">By continuing you agree to our Terms of Service.</p>
    </div>

    <!-- SIDE TAGLINE (desktop only) -->
    <div class="auth-tagline">
      <h2>Try on any outfit<br /><span>before you buy it.</span></h2>
      <p>AI-powered virtual try-on — see yourself in any clothing in seconds.</p>
      <div class="auth-feature-list">
        <div class="auth-feature"><span>⚡</span> Results in ~30 seconds</div>
        <div class="auth-feature"><span>🎯</span> Hyper-realistic AI output</div>
        <div class="auth-feature"><span>🔒</span> Your photos stay private</div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
